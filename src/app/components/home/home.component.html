<main>
  <section class="hero">
    <div class="hero-slideshow">
      <div class="slide active" style="background-image: url('../assets/backgrounds/charminar.png')"></div>
      <div class="slide" style="background-image: url('../assets/backgrounds/kakatiya_thoranam.png')"></div>
      <div class="slide" style="background-image: url('../assets/backgrounds/ramappa.png')"></div>
      <div class="slide" style="background-image: url('../assets/backgrounds/bathukamma.png')"></div>
    </div>
    <div class="slideshow-controls">
  <button (click)="pauseSlideshow()">Pause</button>
  <button (click)="resumeSlideshow()">Resume</button>
</div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1>Celebrating <span>Telangana</span> Heritage in Utah</h1>
      <p class="description">Join our vibrant community celebrating Telangana culture, traditions, and heritage. Connect
        with families, participate in cultural events, and preserve our rich legacy for future generations.</p>
      <div class="hero-buttons">
        <a href="#" class="btn btn-primary">Join Us</a>
        <a href="#" class="btn btn-secondary">Our Events</a>
      </div>
    </div>
    <div class="slide-indicators">
      <button class="indicator active" data-slide="0"></button>
      <button class="indicator" data-slide="1"></button>
      <button class="indicator" data-slide="2"></button>
      <button class="indicator" data-slide="3"></button>
    </div>
  </section>
</main>
