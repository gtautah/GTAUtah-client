<main>
        <!-- Calendar Hero -->
        <section class="calendar-hero">
            <h1>Community Calendar</h1>
            <p>GTA Utah events, festivals, and community gatherings</p>
        </section>

        <!-- Calendar Section -->
        <section class="calendar-section">
            <div class="calendar-wrapper">
                <div class="calendar-header">
                    <h2 id="currentMonth">February 2026</h2>
                    <div class="calendar-nav">
                        <button id="prevMonth" aria-label="Previous month">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                        </button>
                        <button id="nextMonth" aria-label="Next month">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                        </button>
                    </div>
                </div>
                <div class="calendar-grid">
                    <div class="calendar-weekdays">
                        <span>Sun</span>
                        <span>Mon</span>
                        <span>Tue</span>
                        <span>Wed</span>
                        <span>Thu</span>
                        <span>Fri</span>
                        <span>Sat</span>
                    </div>
                    <div class="calendar-days" id="calendarDays">
                        <!-- Days generated by JavaScript -->
                    </div>
                </div>
            </div>

            <!-- Legend -->
            <div class="calendar-legend">
                <div class="legend-item">
                    <div class="legend-dot event"></div>
                    <span>Event Day</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot today"></div>
                    <span>Today</span>
                </div>
            </div>
        </section>
    </main>
